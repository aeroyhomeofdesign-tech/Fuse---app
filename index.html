function getAvatarUrl(username){
return`${SUPABASE_URL}/storage/v1/object/public/avatars/${username}.jpg`;

function Avatar({letter,bg,size=38,username}){
const[imgError,setImgError]=useState(false);
const url=username?getAvatarUrl(username):null;
if(url&&!imgError){
return <img src={url} onError={()=>setImgError(true)} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"2px solid rgba(255,255,255,0.1)"}} alt={letter}/>
}
return <div style={{width:size,height:size,borderRadius:"50%",background:bg||`linear-gradient(135deg,${FIRE},${AMBER})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:size*0.38,color:"#fff",flexShrink:0}}>{letter}</div>
}

function FuseLogo(){
return <svg width="24" height="24" viewBox="0 0 80 80" fill="none"><defs><linearGradient id="lg" x1="12" y1="12" x2="68" y2="68"><stop offset="0%" stopColor={AMBER}/><stop offset="100%" stopColor={FIRE}/></linearGradient></defs><path d="M40 12 L44 32 L56 20 L46 36 L68 34 L50 44 L60 62 L40 50 L20 62 L30 44 L12 34 L34 36 L24 20 L36 32 Z" fill="url(#lg)"/></svg>

function AuthScreen({onAuth}){
const[mode,setMode]=useState("login");
const[email,setEmail]=useState("");
const[password,setPassword]=useState("");
const[username,setUsername]=useState("");
const[loading,setLoading]=useState(false);
const[msg,setMsg]=useState("");
const handleSubmit=async()=>{
setLoading(true);setMsg("");
try{
if(mode==="signup"){
const{data,error}=await supabase.auth.signUp({email,password,options:{data:{username:username||email.split("@")[0]}}});
if(error)setMsg(error.message);
else setMsg("✅ Check your email to confirm!");
}else{
const{data,error}=await supabase.auth.signInWithPassword({email,password});
if(error)setMsg(error.message);
else onAuth(data.user);
}
}catch(e){setMsg("Something went wrong.");}
setLoading(false);
};
return(
<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",minHeight:"80vh"}}>
<div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,77,28,0.12) 0%, transparent 70%)`,pointerEvents:"none"}}/>

<div style={{textAlign:"center",marginBottom:32}}>
<div style={{fontSize:48}}>⚡</div>
<div style={{fontSize:48,fontWeight:900,letterSpacing:8,background:`linear-gradient(135deg,#fff 30%,${FIRE} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Bebas Neue',sans-serif"}}>FUSE</div>
<div style={{fontSize:12,color:"#666",letterSpacing:3,marginTop:4}}>FREE · UNCENSORED · SOCIAL · EXPRESSION</div>
</div>
<div style={{display:"flex",gap:4,background:"#111",borderRadius:8,padding:4,marginBottom:24,border:"1px solid rgba(255,255,255,0.07)"}}>
{["login","signup"].map(m=>(
<button key={m} onClick={()=>{setMode(m);setMsg("");}} style={{flex:1,padding:"10px",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer",border:"none",background:mode===m?FIRE:"transparent",color:mode===m?"#fff":"#666",letterSpacing:1,textTransform:"uppercase"}}>
{m==="login"?"Sign In":"Join FUSE"}
</button>
))}
</div>
{mode==="signup"&&(
<div style={{marginBottom:12}}>
<div style={{fontSize:12,color:"#666",marginBottom:6,letterSpacing:1}}>USERNAME</div>
<input value={username} onChange={e=>setUsername(e.target.value)} placeholder="@yourname" style={{width:"100%",background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"12px 14px",color:"#F0EDE8",fontSize:14,outline:"none"}}/>
</div>
)}

<div style={{fontSize:12,color:"#666",marginBottom:6,letterSpacing:1}}>EMAIL</div>
<input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" type="email" style={{width:"100%",background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"12px 14px",color:"#F0EDE8",fontSize:14,outline:"none"}}/>
</div>
<div style={{marginBottom:20}}>
<div style={{fontSize:12,color:"#666",marginBottom:6,letterSpacing:1}}>PASSWORD</div>
<input value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" type="password" style={{width:"100%",background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"12px 14px",color:"#F0EDE8",fontSize:14,outline:"none"}}/>
</div>
{msg&&<div style={{background:msg.includes("✅")?"rgba(16,185,129,0.1)":"rgba(255,77,28,0.1)",border:`1px solid ${msg.includes("✅")?"rgba(16,185,129,0.3)":"rgba(255,77,28,0.3)"}`,borderRadius:6,padding:"10px 14px",fontSize:13,marginBottom:16,color:msg.includes("✅")?"#10b981":FIRE}}>{msg}</div>}
<button onClick={handleSubmit} disabled={loading} style={{width:"100%",background:loading?"#333":FIRE,color:"#fff",border:"none",padding:"14px",borderRadius:6,fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer",letterSpacing:1}}>
{loading?"Loading...":(mode==="login"?"SIGN IN":"CREATE ACCOUNT")}

function timeAgo(ts){
const s=Math.floor((Date.now()-new Date(ts))/1000);
if(s<60)return "just now";
if(s<3600)return Math.floor(s/60)+"m ago";
if(s<86400)return Math.floor(s/3600)+"h ago";
return Math.floor(s/86400)+"d ago";
}

function PostCard({post,currentUser,onLike}){
const[liked,setLiked]=useState(false);
const[likes,setLikes]=useState(post.likes||0);
const username=currentUser?.user_metadata?.username||currentUser?.email?.split("@")[0]||"user";
const toggle=()=>{
const newLiked=!liked;
setLiked(newLiked);
setLikes(newLiked?likes+1:likes-1);
if(newLiked&&post.username!==username)onLike(post.username,post.body);
};
return(
<div style={{padding:16,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
<div style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(255,171,0,0.1)",border:"1px solid rgba(255,171,0,0.2)",color:AMBER,fontSize:10,padding:"2px 8px",borderRadius:3,marginBottom:8,letterSpacing:1,fontWeight:600}}>{post.ground||"🎙 OPEN MIC"}</div>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
<Avatar letter={(post.username||"U")[0].toUpperCase()} username={post.username} size={34}/>
<div style={{flex:1}}><span style={{fontSize:14,fontWeight:700}}>@{post.username}</span></div>
<span style={{fontSize:11,color:"#555"}}>{timeAgo(post.created_at)}</span>
</div>
<div style={{fontSize:14,lineHeight:1.65,color:"rgba(240,237,232,0.82)",paddingLeft:44,marginBottom:12}}>{post.body}</div>
<div style={{display:"flex",gap:4,paddingLeft:44}}>
<button onClick={toggle} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px",borderRadius:4,fontSize:12,color:liked?FIRE:"#666",background:"none",border:"none",cursor:"pointer"}}>{liked?"♥":"♡"} {likes}</button>
<button style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px",borderRadius:4,fontSize:12,color:"#666",background:"none",border:"none",cursor:"pointer"}}>💬 0</button>
</div>
</div>
);
}

function FeedScreen({user,addToast}){
const[posts,setPosts]=useState([]);
const[newPost,setNewPost]=useState("");
const[loading,setLoading]=useState(false);
const[fetching,setFetching]=useState(true);
const[activeTab,setActiveTab]=useState("For You");
const username=user?.user_metadata?.username||user?.email?.split("@")[0]||"user";

useEffect(()=>{
fetchPosts();
const channel=supabase.channel('realtime-posts')
.on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},payload=>{
const p=payload.new;
setPosts(prev=>[p,...prev]);
if(p.username!==username){
addToast({icon:"🔥",title:"NEW POST",message:`@${p.username} just posted on FUSE!`,color:FIRE});
}
if(p.body&&p.body.includes(`@${username}`)){
addToast({icon:"📣",title:"YOU WERE MENTIONED",message:`@${p.username} mentioned you!`,color:AMBER});
}
}).subscribe();
return()=>supabase.removeChannel(channel);
},[]);

const fetchPosts=async()=>{
setFetching(true);
const{data}=await supabase.from('posts').select('*').order('created_at',{ascending:false}).limit(50);
if(data)setPosts(data);
setFetching(false);
};

const submitPost=async()=>{
if(!newPost.trim())return;
setLoading(true);
const{error}=await supabase.from('posts').insert({body:newPost,username,ground:"🎙 OPEN MIC"});
if(!error)setNewPost("");
setLoading(false);
};

return(
<div style={{flex:1}}>
<div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:56,background:"rgba(10,10,10,0.95)",backdropFilter:"blur(12px)",zIndex:10}}>
<div style={{fontSize:20,fontWeight:900,letterSpacing:2}}>FEED</div>
<div style={{display:"flex",gap:4}}>
{["For You","Following","Trending"].map(t=>(
<button key={t} onClick={()=>setActiveTab(t)} style={{padding:"5px 10px",borderRadius:4,fontSize:11,fontWeight:600,cursor:"pointer",border:"none",background:activeTab===t?FIRE:"transparent",color:activeTab===t?"#fff":"#666"}}>{t}</button>
))}
</div>
</div>
<div style={{padding:16,borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",gap:10}}>
<Avatar letter={username[0].toUpperCase()} username={username} size={38}/>
<div style={{flex:1}}>
<textarea value={newPost} onChange={e=>setNewPost(e.target.value)} style={{width:"100%",background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 14px",color:"#F0EDE8",fontSize:14,resize:"none",outline:"none",height:72}} placeholder="What's on your mind? Speak freely."/>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
<span style={{fontSize:12,color:"#555"}}>@{username}</span>
<button onClick={submitPost} disabled={loading} style={{background:loading?"#333":FIRE,color:"#fff",border:"none",padding:"8px 20px",borderRadius:4,fontSize:13,fontWeight:800,cursor:"pointer",letterSpacing:1}}>{loading?"Posting...":"FUSE IT ⚡"}</button>
</div>
</div>
</div>
{fetching?<div style={{textAlign:"center",padding:40,color:"#555",fontSize:24}}>⚡</div>:
posts.length===0?<div style={{textAlign:"center",padding:40,color:"#555",fontSize:14}}>No posts yet. Be the first! 🔥</div>:
posts.map(p=><PostCard key={p.id} post={p} currentUser={user} onLike={(a,b)=>addToast({icon:"♥",title:"YOUR POST WAS LIKED",message:`Someone liked: "${b.slice(0,40)}..."`,color:"#ec4899"})}/>)}
</div>
);
}

function ProfileScreen({user,onSignOut,addToast}){
const[posts,setPosts]=useState([]);
const[uploading,setUploading]=useState(false);
const[avatarKey,setAvatarKey]=useState(Date.now());
const fileRef=useRef();
const username=user?.user_metadata?.username||user?.email?.split("@")[0]||"user";

useEffect(()=>{
supabase.from('posts').select('*').eq('username',username).order('created_at',{ascending:false}).then(({data})=>{if(data)setPosts(data);});
},[]);

const uploadAvatar=async(e)=>{
const file=e.target.files[0];
if(!file)return;
setUploading(true);
try{
const{error}=await supabase.storage.from('avatars').upload(`${username}.jpg`,file,{upsert:true,contentType:file.type});
if(error)throw error;
setAvatarKey(Date.now());
addToast({icon:"🖼",title:"PROFILE PICTURE UPDATED",message:"Your new profile picture is live!",color:"#10b981"});
}catch(e){
addToast({icon:"❌",title:"UPLOAD FAILED",message:e.message,color:FIRE});
}
setUploading(false);
};

return(
<div style={{flex:1,maxWidth:680}}>
<div style={{height:140,background:"linear-gradient(135deg,#1a0a00 0%,#2d1200 50%,rgba(255,77,28,0.12) 100%)"}}/>
<div style={{padding:"0 20px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
<div style={{marginTop:-28,marginBottom:10,position:"relative",display:"inline-block"}}>
<Avatar key={avatarKey} letter={username[0].toUpperCase()} username={username} size={72}/>
<button onClick={()=>fileRef.current.click()} style={{position:"absolute",bottom:0,right:0,width:24,height:24,borderRadius:"50%",background:FIRE,border:"2px solid #0A0A0A",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:12}}>
{uploading?<span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>:"📷"}
</button>
<input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={uploadAvatar}/>
</div>
<div style={{fontSize:20,fontWeight:800,marginBottom:2}}>{username} <span style={{color:FIRE,fontSize:16}}>✦</span></div>
<div style={{fontSize:12,color:"#666",fontFamily:"monospace",marginBottom:10}}>@{username} · FUSE Member</div>
<div style={{display:"flex",gap:20,marginBottom:16}}>
{[[posts.length,"Posts"],["0","Followers"],["0","Following"]].map(([num,label])=>(
<div key={label}><div style={{fontSize:20,fontWeight:900}}>{num}</div><div style={{fontSize:11,color:"#666"}}>{label}</div></div>
))}
</div>
<div style={{display:"flex",gap:8}}>
<button onClick={()=>fileRef.current.click()} style={{background:FIRE,color:"#fff",border:"none",padding:"8px 18px",borderRadius:4,fontSize:13,fontWeight:600,cursor:"pointer"}}>📷 Change Photo</button>
<button onClick={onSignOut} style={{background:"rgba(255,77,28,0.15)",border:"1px solid rgba(255,77,28,0.3)",color:FIRE,padding:"8px 18px",borderRadius:4,fontSize:13,fontWeight:600,cursor:"pointer"}}>Sign Out</button>
</div>
</div>
{posts.length===0?
<div style={{textAlign:"center",padding:40,color:"#555",fontSize:14}}>No posts yet. Share your first thought! 🔥</div>:
posts.map(p=><PostCard key={p.id} post={p} currentUser={user} onLike={()=>{}}/>)}
</div>
);
}

function App(){
const[user,setUser]=useState(null);
const[screen,setScreen]=useState("splash");
const[loading,setLoading]=useState(true);
const[toasts,setToasts]=useState([]);
const[notifs,setNotifs]=useState([]);
const[showNotifs,setShowNotifs]=useState(false);
const[unread,setUnread]=useState(0);
const toastTimer=useRef({});

const addToast=(t)=>{
const id=Date.now();
const toast={...t,id};
setToasts(p=>[...p,toast]);
setNotifs(p=>[{...toast,time:new Date().toISOString(),read:false},...p]);
setUnread(p=>p+1);
toastTimer.current[id]=setTimeout(()=>{
setToasts(p=>p.filter(x=>x.id!==id));
},4000);
};

const removeToast=(id)=>{
clearTimeout(toastTimer.current[id]);
setToasts(p=>p.filter(x=>x.id!==id));
};

const openNotifs=()=>{
setShowNotifs(true);
setUnread(0);
setNotifs(p=>p.map(n=>({...n,read:true})));
};

useEffect(()=>{
supabase.auth.getSession().then(({data:{session}})=>{
if(session?.user){setUser(session.user);setScreen("feed");}
setLoading(false);
});
supabase.auth.onAuthStateChange((_,session)=>{
if(session?.user){
setUser(session.user);setScreen("feed");
addToast({icon:"👋",title:"WELCOME TO FUSE",message:"You're now part of the free speech revolution!",color:"#10b981"});
}
else{setUser(null);setScreen("splash");}
});
},[]);

const handleSignOut=async()=>{
await supabase.auth.signOut();
setUser(null);setScreen("splash");
};

if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",fontSize:32}}>⚡</div>;

const SCREENS=user?["feed","communities","profile"]:["splash","auth"];
const LABELS=user?["FEED","GROUNDS","PROFILE"]:["HOME","JOIN"];

return(
<div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#0A0A0A",color:"#F0EDE8",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
<ToastContainer toasts={toasts} onRemove={removeToast}/>
{showNotifs&&<NotificationsPanel notifs={notifs} onClear={()=>{setNotifs([]);setUnread(0);}} onClose={()=>setShowNotifs(false)}/>}
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(10,10,10,0.97)",position:"sticky",top:0,zIndex:50}}>
<div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setScreen(user?"feed":"splash")}>
<FuseLogo/>
<div style={{fontSize:26,fontWeight:900,letterSpacing:6,background:`linear-gradient(135deg,#fff 30%,${FIRE} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Bebas Neue',sans-serif"}}>FUSE</div>
</div>
<div style={{display:"flex",alignItems:"center",gap:8}}>
{user&&(
<button onClick={openNotifs} style={{position:"relative",background:"none",border:"none",cursor:"pointer",padding:6,color:"#888",fontSize:18}}>
🔔
{unread>0&&<div style={{position:"absolute",top:2,right:2,width:16,height:16,borderRadius:"50%",background:FIRE,fontSize:10,fontWeight:700,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</div>}
</button>
)}
<div style={{display:"flex",gap:3,background:"#111",borderRadius:8,padding:4,border:"1px solid rgba(255,255,255,0.07)"}}>
{SCREENS.map((s,i)=>(
<button key={s} onClick={()=>setScreen(s)} style={{padding:"6px 12px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",border:"none",letterSpacing:1,background:screen===s?FIRE:"transparent",color:screen===s?"#fff":"#888"}}>{LABELS[i]}</button>
))}
</div>
</div>
</div>
{screen==="splash"&&(
<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,position:"relative",minHeight:"80vh"}}>
<div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,77,28,0.15) 0%, transparent 70%)`,pointerEvents:"none"}}/>
<div style={{position:"relative",zIndex:2,textAlign:"center"}}>
<div style={{fontSize:60,marginBottom:4}}>⚡</div>
<div style={{fontSize:80,fontWeight:900,letterSpacing:12,lineHeight:1,background:`linear-gradient(135deg,#fff 30%,${FIRE} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Bebas Neue',sans-serif"}}>FUSE</div>
<div style={{fontSize:12,letterSpacing:4,color:"#666",marginTop:6}}>FREE · UNCENSORED · SOCIAL · EXPRESSION</div>
<p style={{fontSize:18,fontWeight:300,color:"rgba(240,237,232,0.6)",marginTop:24}}>Where <span style={{color:FIRE,fontWeight:600}}>every voice</span> ignites something real.</p>
<div style={{display:"flex",flexDirection:"column",gap:12,marginTop:40,width:280,margin:"40px auto 0"}}>
<button onClick={()=>setScreen("auth")} style={{background:FIRE,color:"#fff",border:"none",padding:"15px 32px",fontSize:15,fontWeight:700,borderRadius:6,cursor:"pointer"}}>Join FUSE — It's Free</button>
<button onClick={()=>setScreen("auth")} style={{background:"transparent",color:"#F0EDE8",border:"1px solid rgba(255,255,255,0.12)",padding:"15px 32px",fontSize:15,fontWeight:500,borderRadius:6,cursor:"pointer"}}>Sign In</button>
</div>
<div style={{display:"flex",gap:20,marginTop:40,flexWrap:"wrap",justifyContent:"center"}}>
{["Free Speech","No Cancel Culture","Clean Platform","Real People"].map(v=>(
<div key={v} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#666"}}>
<span style={{width:6,height:6,borderRadius:"50%",background:FIRE,display:"inline-block"}}/> {v}
</div>
))}
</div>
</div>
</div>
)}
{screen==="auth"&&<AuthScreen onAuth={(u)=>{setUser(u);setScreen("feed");}}/>}
{screen==="feed"&&<FeedScreen user={user} addToast={addToast}/>}
{screen==="communities"&&<CommunitiesScreen/>}
{screen==="profile"&&<ProfileScreen user={user} onSignOut={handleSignOut} addToast={addToast}/>}
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
