function MentionPicker({query,onSelect}){
const[users,setUsers]=useState([]);
useEffect(()=>{
if(query===null)return;
supabase.from('posts').select('username').ilike('username',`%${query}%`).then(({data})=>{
if(data){const u=[...new Set(data.map(p=>p.username))].slice(0,5);setUsers(u);}
});
},[query]);
if(!users.length)return null;
return(
<div style={{position:"absolute",bottom:"100%",left:0,right:0,background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,marginBottom:4,zIndex:100,overflow:"hidden",boxShadow:"0 -8px 24px rgba(0,0,0,0.4)"}}>
{users.map(u=>(
<div key={u} onClick={()=>onSelect(u)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
<Avatar letter={u[0].toUpperCase()} username={u} size={28}/>
<span style={{fontSize:14,fontWeight:600}}>@{u}</span>
</div>
))}
</div>
);
}

function SmartTextarea({value,onChange,placeholder,style}){
const[mq,setMq]=useState(null);
const ref=useRef();
const handleChange=(e)=>{
const val=e.target.value;onChange(val);
const cur=e.target.selectionStart;
const match=val.slice(0,cur).match(/@(\w*)$/);
setMq(match?match[1]:null);
};
const insert=(u)=>{
const cur=ref.current.selectionStart;
const before=value.slice(0,cur);
const after=value.slice(cur);
const replaced=before.replace(/@(\w*)$/,`@${u} `);
onChange(replaced+after);setMq(null);
setTimeout(()=>{ref.current.focus();ref.current.setSelectionRange(replaced.length,replaced.length);},10);
};
return(
<div style={{position:"relative",flex:1}}>
{mq!==null&&<MentionPicker query={mq} onSelect={insert}/>}
<textarea ref={ref} value={value} onChange={handleChange} placeholder={placeholder} style={style}/>
</div>
);
}

function PostBody({body}){
if(!body)return null;
return(
<div style={{fontSize:14,lineHeight:1.65,color:"rgba(240,237,232,0.82)",marginBottom:8}}>

p.match(/^@\w+$/)?<span key={i} style={{color:AMBER,fontWeight:600}}>{p}</span>:<span key={i}>{p}</span>
)}
</div>
);
}

function timeAgo(ts){
const s=Math.floor((Date.now()-new Date(ts))/1000);
if(s<60)return "just now";if(s<3600)return Math.floor(s/60)+"m ago";
if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";
}

function FollowButton({currentUsername,targetUsername,onFollow}){
const[following,setFollowing]=useState(false);
const[loading,setLoading]=useState(false);
useEffect(()=>{
if(!currentUsername||currentUsername===targetUsername)return;
supabase.from('follows').select('id').eq('follower',currentUsername).eq('following',targetUsername).single().then(({data})=>setFollowing(!!data));
},[currentUsername,targetUsername]);
const toggle=async()=>{
if(!currentUsername||currentUsername===targetUsername)return;
setLoading(true);
if(following){await supabase.from('follows').delete().eq('follower',currentUsername).eq('following',targetUsername);setFollowing(false);}
else{await supabase.from('follows').insert({follower:currentUsername,following:targetUsername});setFollowing(true);if(onFollow)onFollow(targetUsername);}
setLoading(false);
};
if(currentUsername===targetUsername)return null;
return <button onClick={toggle} disabled={loading} style={{background:following?"transparent":FIRE,color:following?"#F0EDE8":"#fff",border:following?"1px solid rgba(255,255,255,0.2)":"none",padding:"6px 16px",borderRadius:4,fontSize:12,fontWeight:700,cursor:"pointer"}}>{loading?"...":(following?"Following":"Follow")}</button>
}

</div>
);
return <button onClick={()=>setConfirm(true)} style={{background:"none",border:"none",color:"#555",fontSize:14,cursor:"pointer",padding:"2px 6px"}}>{label}</button>
}

const[loading,setLoading]=useState(false);
const[fetching,setFetching]=useState(true);
const username=currentUser?.user_metadata?.username||currentUser?.email?.split("@")[0]||"user";
useEffect(()=>{
supabase.from('comments').select('*').eq('post_id',post.id).order('created_at',{ascending:true}).then(({data})=>{if(data)setComments(data);setFetching(false);});
const ch=supabase.channel(`c-${post.id}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:`post_id=eq.${post.id}`},p=>{
setComments(prev=>[...prev,p.new]);
if(p.new.username!==username&&post.username===username)addToast({icon:"💬",title:"NEW COMMENT",message:`@${p.new.username} commented!`,color:"#8b5cf6"});
}).subscribe();
return()=>supabase.removeChannel(ch);
},[post.id]);
const submit=async()=>{
if(!nc.trim())return;setLoading(true);
await supabase.from('comments').insert({post_id:post.id,body:nc,username});
setNc("");setLoading(false);
};

await supabase.from('comments').delete().eq('id',id);
setComments(p=>p.filter(c=>c.id!==id));

function DMScreen({currentUser,initialRecipient,onClose,addToast}){
const[conversations,setConversations]=useState([]);
const[activeChat,setActiveChat]=useState(initialRecipient||null);
const[messages,setMessages]=useState([]);
const[newMsg,setNewMsg]=useState("");
const[sending,setSending]=useState(false);
const[newChatUser,setNewChatUser]=useState("");
const[searchResults,setSearchResults]=useState([]);
const[unreadCounts,setUnreadCounts]=useState({});
const messagesEndRef=useRef();
const username=currentUser?.user_metadata?.username||currentUser?.email?.split("@")[0]||"user";
useEffect(()=>{fetchConversations();},[]);
useEffect(()=>{
if(!activeChat)return;
fetchMessages(activeChat);markRead(activeChat);
const ch=supabase.channel(`dm-${[username,activeChat].sort().join("-")}`)
.on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{
const m=p.new;
if((m.sender===username&&m.receiver===activeChat)||(m.sender===activeChat&&m.receiver===username)){
setMessages(prev=>[...prev,m]);
if(m.sender!==username)markRead(activeChat);
}
}).subscribe();
return()=>supabase.removeChannel(ch);
},[activeChat]);
useEffect(()=>{if(messagesEndRef.current)messagesEndRef.current.scrollIntoView({behavior:"smooth"});},[messages]);
useEffect(()=>{
const ch=supabase.channel('dm-notif').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{
const m=p.new;
if(m.receiver===username&&m.sender!==activeChat){
addToast({icon:"💬",title:"NEW MESSAGE",message:`@${m.sender}: ${m.body.slice(0,40)}`,color:"#8b5cf6"});
setUnreadCounts(prev=>({...prev,[m.sender]:(prev[m.sender]||0)+1}));
fetchConversations();
}
}).subscribe();
return()=>supabase.removeChannel(ch);
},[activeChat]);
const fetchConversations=async()=>{
const{data}=await supabase.from('messages').select('*').or(`sender.eq.${username},receiver.eq.${username}`).order('created_at',{ascending:false});
if(!data)return;
const seen=new Set();const convos=[];
data.forEach(m=>{
const other=m.sender===username?m.receiver:m.sender;
if(!seen.has(other)){seen.add(other);convos.push({username:other,lastMsg:m.body,lastTime:m.created_at,unread:!m.read&&m.receiver===username});}
});
setConversations(convos);
};
const fetchMessages=async(other)=>{
const{data}=await supabase.from('messages').select('*').or(`and(sender.eq.${username},receiver.eq.${other}),and(sender.eq.${other},receiver.eq.${username})`).order('created_at',{ascending:true});
if(data)setMessages(data);
};
const markRead=async(other)=>{
await supabase.from('messages').update({read:true}).eq('receiver',username).eq('sender',other);
setUnreadCounts(prev=>({...prev,[other]:0}));
};
const sendMessage=async()=>{
if(!newMsg.trim()||!activeChat)return;setSending(true);
await supabase.from('messages').insert({sender:username,receiver:activeChat,body:newMsg});
setNewMsg("");setSending(false);fetchConversations();
};

};

};

setActiveChat(u);setNewChatUser("");setSearchResults([]);

<Avatar letter={activeChat[0].toUpperCase()} username={activeChat} size={36}/>
<div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>@{activeChat}</div><div style={{fontSize:11,color:"#555"}}>FUSE Member</div></div>
<button onClick={onClose} style={{background:"none",border:"none",color:"#555",fontSize:20,cursor:"pointer"}}>×</button>
</div>
<div style={{flex:1,overflowY:"auto",padding:"16px"}}>
{messages.length===0&&<div style={{textAlign:"center",padding:40,color:"#555",fontSize:14}}>No messages yet. Say hello! 👋</div>}
{messages.map((m,i)=>{
const mine=m.sender===username;
return(
<div key={m.id||i} className="fade-up" style={{display:"flex",justifyContent:mine?"flex-end":"flex-start",marginBottom:10,gap:6,alignItems:"flex-end"}}>
{!mine&&<Avatar letter={m.sender[0].toUpperCase()} username={m.sender} size={26}/>}
<div style={{maxWidth:"72%"}}>
<div style={{background:mine?FIRE:"#1A1A1A",color:"#fff",padding:"10px 14px",borderRadius:mine?"12px 12px 4px 12px":"12px 12px 12px 4px",fontSize:14,lineHeight:1.5,border:mine?"none":"1px solid rgba(255,255,255,0.07)"}}>
{m.body}
</div>
<div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,justifyContent:mine?"flex-end":"flex-start"}}>
<span style={{fontSize:10,color:"#555"}}>{timeAgo(m.created_at)}</span>
{mine&&<DeleteButton onDelete={()=>deleteMessage(m.id)} label="🗑"/>}
</div>
</div>
</div>
);
})}
<div ref={messagesEndRef}/>
</div>
<div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.07)",background:"#0F0F0F",flexShrink:0}}>

<div style={{flex:1,background:"#1A1A1A",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",padding:"10px 14px"}}>
<textarea value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}} placeholder="Write a message..." style={{width:"100%",background:"none",border:"none",outline:"none",color:"#F0EDE8",fontSize:14,resize:"none",height:36,maxHeight:100}}/>
</div>
<button onClick={sendMessage} disabled={sending||!newMsg.trim()} style={{background:newMsg.trim()?FIRE:"#333",color:"#fff",border:"none",width:44,height:44,borderRadius:"50%",cursor:newMsg.trim()?"pointer":"not-allowed",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>➤</button>
</div>
</div>
</div>
);
}
return(
<div style={{position:"fixed",inset:0,zIndex:250,display:"flex",flexDirection:"column",background:"#0A0A0A"}}>
<div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(10,10,10,0.97)",flexShrink:0}}>
<div style={{fontSize:20,fontWeight:900,letterSpacing:2}}>💬 MESSAGES</div>
<button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>×</button>
</div>
<div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0,position:"relative"}}>
<div style={{display:"flex",alignItems:"center",gap:10,background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"10px 14px"}}>
<span style={{color:"#555"}}>🔍</span>
<input value={newChatUser} onChange={e=>{setNewChatUser(e.target.value);searchUsers(e.target.value);}} placeholder="Search users to message..." style={{flex:1,background:"none",border:"none",outline:"none",color:"#F0EDE8",fontSize:14}}/>
{newChatUser&&<button onClick={()=>{setNewChatUser("");setSearchResults([]);}} style={{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer"}}>×</button>}
</div>
{searchResults.length>0&&(
<div style={{position:"absolute",left:16,right:16,top:"100%",background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,zIndex:10,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>
{searchResults.map(u=>(
<div key={u} onClick={()=>startChat(u)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
<Avatar letter={u[0].toUpperCase()} username={u} size={32}/>
<span style={{fontSize:14,fontWeight:600}}>@{u}</span>
</div>
))}
</div>
)}
</div>
<div style={{flex:1,overflowY:"auto"}}>
{conversations.length===0&&<div style={{textAlign:"center",padding:40,color:"#555",fontSize:14}}>No messages yet.<br/>Search for a user to start chatting! 💬</div>}
{conversations.map(c=>(
<div key={c.username} onClick={()=>startChat(c.username)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)",cursor:"pointer"}}>
<div style={{position:"relative"}}>
<Avatar letter={c.username[0].toUpperCase()} username={c.username} size={46}/>
{(unreadCounts[c.username]>0||c.unread)&&<div style={{position:"absolute",top:0,right:0,width:12,height:12,borderRadius:"50%",background:FIRE,border:"2px solid #0A0A0A"}}/>}
</div>

<div style={{fontSize:14,fontWeight:700,marginBottom:2}}>@{c.username}</div>

</div>

function GroundScreen({ground,currentUser,onBack,addToast,onUserClick,onDM}){
const[posts,setPosts]=useState([]);
const[newPost,setNewPost]=useState("");
const[imageFile,setImageFile]=useState(null);
const[imagePreview,setImagePreview]=useState(null);
const[videoFile,setVideoFile]=useState(null);
const[videoPreview,setVideoPreview]=useState(null);
const[loading,setLoading]=useState(false);
const[fetching,setFetching]=useState(true);
const[memberCount,setMemberCount]=useState(0);
const[isMember,setIsMember]=useState(false);
const[showDeleteGround,setShowDeleteGround]=useState(false);
const[uploadProgress,setUploadProgress]=useState(0);
const imgRef=useRef();
const vidRef=useRef();
const username=currentUser?.user_metadata?.username||currentUser?.email?.split("@")[0]||"user";
const isOwner=ground.created_by===username;
useEffect(()=>{
supabase.from('posts').select('*').eq('ground',ground.name).order('created_at',{ascending:false}).limit(50).then(({data})=>{if(data)setPosts(data);setFetching(false);});
supabase.from('ground_members').select('id',{count:'exact'}).eq('ground_name',ground.name).then(({count})=>setMemberCount(count||0));
supabase.from('ground_members').select('id').eq('ground_name',ground.name).eq('username',username).single().then(({data})=>setIsMember(!!data));
},[ground.name]);
const toggleMember=async()=>{
if(isMember){await supabase.from('ground_members').delete().eq('ground_name',ground.name).eq('username',username);setIsMember(false);setMemberCount(m=>m-1);}
else{await supabase.from('ground_members').insert({ground_name:ground.name,username});setIsMember(true);setMemberCount(m=>m+1);addToast({icon:"🔥",title:"JOINED!",message:`You joined ${ground.emoji} ${ground.name}!`,color:AMBER});}
};
const deleteGround=async()=>{
await supabase.from('ground_members').delete().eq('ground_name',ground.name);
await supabase.from('grounds').delete().eq('id',ground.id);
addToast({icon:"🗑",title:"GROUND DELETED",message:`${ground.name} has been removed.`,color:"#666"});
onBack();
};
const pickImage=(e)=>{
const file=e.target.files[0];if(!file)return;
setVideoFile(null);setVideoPreview(null);
setImageFile(file);const r=new FileReader();r.onload=ev=>setImagePreview(ev.target.result);r.readAsDataURL(file);
};
const pickVideo=(e)=>{
const file=e.target.files[0];if(!file)return;
setImageFile(null);setImagePreview(null);
setVideoFile(file);setVideoPreview(URL.createObjectURL(file));
};
const submitPost=async()=>{
if(!newPost.trim()&&!imageFile&&!videoFile)return;setLoading(true);setUploadProgress(0);
let image_url=null;let video_url=null;
if(imageFile){
const path=`${username}-${Date.now()}.jpg`;
const{error}=await supabase.storage.from('post-images').upload(path,imageFile,{contentType:imageFile.type});
if(!error)image_url=path;
}
if(videoFile){
const path=`${username}-${Date.now()}.mp4`;
setUploadProgress(10);
const{error}=await supabase.storage.from('post-videos').upload(path,videoFile,{contentType:videoFile.type});
if(!error)video_url=path;
setUploadProgress(100);
}
const{data}=await supabase.from('posts').insert({body:newPost,username,ground:ground.name,image_url,video_url}).select().single();
if(data)setPosts(p=>[data,...p]);
setNewPost("");setImageFile(null);setImagePreview(null);setVideoFile(null);setVideoPreview(null);setUploadProgress(0);setLoading(false);
};
return(
<div style={{flex:1}}>
{showDeleteGround&&(
<div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.85)"}} onClick={()=>setShowDeleteGround(false)}/>
<div style={{position:"relative",zIndex:401,background:"#111",borderRadius:12,padding:24,width:"100%",maxWidth:320,border:"1px solid rgba(255,77,28,0.3)"}}>
<div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Delete Ground?</div>
<div style={{fontSize:13,color:"#888",marginBottom:20}}>This will permanently delete <span style={{color:FIRE}}>{ground.name}</span> and remove all members.</div>
<div style={{display:"flex",gap:8}}>
<button onClick={()=>setShowDeleteGround(false)} style={{flex:1,background:"transparent",color:"#888",border:"1px solid rgba(255,255,255,0.1)",padding:"10px",borderRadius:6,cursor:"pointer"}}>Cancel</button>
<button onClick={deleteGround} style={{flex:1,background:FIRE,color:"#fff",border:"none",padding:"10px",borderRadius:6,fontWeight:700,cursor:"pointer"}}>Delete</button>
</div>
</div>
</div>
)}
<div style={{position:"sticky",top:56,zIndex:10,background:"rgba(10,10,10,0.97)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
<div style={{height:80,background:`linear-gradient(135deg,#1a0a00,#2d1200,rgba(255,77,28,0.15))`,display:"flex",alignItems:"center",padding:"0 20px",gap:12}}>
<button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#F0EDE8",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
<div style={{fontSize:32}}>{ground.emoji}</div>
<div style={{flex:1}}><div style={{fontSize:20,fontWeight:900}}>{ground.name}</div><div style={{fontSize:12,color:"#888"}}>{memberCount} members</div></div>
<div style={{display:"flex",gap:8,alignItems:"center"}}>
{isOwner&&<button onClick={()=>setShowDeleteGround(true)} style={{background:"rgba(255,77,28,0.15)",border:`1px solid rgba(255,77,28,0.3)`,color:FIRE,padding:"6px 10px",borderRadius:4,fontSize:12,cursor:"pointer"}}>🗑</button>}
<button onClick={toggleMember} style={{background:isMember?"transparent":FIRE,color:isMember?"#F0EDE8":"#fff",border:isMember?"1px solid rgba(255,255,255,0.2)":"none",padding:"8px 18px",borderRadius:4,fontSize:13,fontWeight:700,cursor:"pointer"}}>{isMember?"✓ Joined":"Join"}</button>
</div>
</div>
<div style={{padding:"10px 16px",fontSize:13,color:"#666"}}>{ground.description}</div>
</div>
<div style={{padding:16,borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",gap:10}}>
<Avatar letter={username[0].toUpperCase()} username={username} size={38}/>
<div style={{flex:1}}>
<SmartTextarea value={newPost} onChange={setNewPost} placeholder={`Post in ${ground.name}...`} style={{width:"100%",background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 14px",color:"#F0EDE8",fontSize:14,resize:"none",outline:"none",height:72}}/>
{imagePreview&&<div style={{position:"relative",marginTop:8,display:"inline-block"}}><img src={imagePreview} style={{maxHeight:140,maxWidth:"100%",borderRadius:8,objectFit:"cover"}} alt="preview"/><button onClick={()=>{setImageFile(null);setImagePreview(null);}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",width:22,height:22,borderRadius:"50%",cursor:"pointer",fontSize:13}}>×</button></div>}
{videoPreview&&<div style={{position:"relative",marginTop:8}}><video src={videoPreview} style={{width:"100%",maxHeight:140,borderRadius:8,background:"#000"}} controls/><button onClick={()=>{setVideoFile(null);setVideoPreview(null);}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",width:22,height:22,borderRadius:"50%",cursor:"pointer",fontSize:13}}>×</button></div>}
{loading&&videoFile&&uploadProgress>0&&<div style={{marginTop:8,background:"#1A1A1A",borderRadius:4,overflow:"hidden",height:4}}><div style={{height:"100%",background:FIRE,width:`${uploadProgress}%`,transition:"width 0.3s"}}/></div>}
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
<div style={{display:"flex",gap:6}}>
<button onClick={()=>imgRef.current.click()} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",color:"#888",padding:"5px 10px",borderRadius:4,fontSize:12,cursor:"pointer"}}>🖼</button>
<button onClick={()=>vidRef.current.click()} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",color:"#888",padding:"5px 10px",borderRadius:4,fontSize:12,cursor:"pointer"}}>🎥</button>
<input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={pickImage}/>
<input ref={vidRef} type="file" accept="video/*" style={{display:"none"}} onChange={pickVideo}/>
</div>
<button onClick={submitPost} disabled={loading||(!newPost.trim()&&!imageFile&&!videoFile)} style={{background:loading||(!newPost.trim()&&!imageFile&&!videoFile)?"#333":FIRE,color:"#fff",border:"none",padding:"8px 20px",borderRadius:4,fontSize:13,fontWeight:800,cursor:"pointer"}}>{loading?"Uploading...":"FUSE IT ⚡"}</button>
</div>
</div>
</div>
{fetching?<div style={{textAlign:"center",padding:40,color:"#555",fontSize:24}}>⚡</div>:
posts.length===0?<div style={{textAlign:"center",padding:40,color:"#555",fontSize:14}}>No posts yet. Be the first! 🔥</div>:
posts.map(p=><PostCard key={p.id} post={p} currentUser={currentUser} addToast={addToast} onLike={()=>{}} onUserClick={onUserClick} onDM={onDM} onDeleted={(id)=>setPosts(prev=>prev.filter(x=>x.id!==id))}/>)}
</div>
);
}

function CreateGroundModal({currentUser,onClose,onCreated,addToast}){
const[name,setName]=useState("");
const[desc,setDesc]=useState("");
const[emoji,setEmoji]=useState("🔥");
const[loading,setLoading]=useState(false);
const[error,setError]=useState("");
const username=currentUser?.user_metadata?.username||currentUser?.email?.split("@")[0]||"user";
const emojis=["🔥","🌍","🎙","🗳","💼","🎬","✝","🎮","🏆","🎵","📚","💪","🌱","🏥","⚡"];
const submit=async()=>{
if(!name.trim()||name.length<3){setError("Name must be at least 3 characters");return;}
setLoading(true);setError("");
const{data,error:err}=await supabase.from('grounds').insert({name:name.trim(),description:desc,emoji,created_by:username}).select().single();
if(err){setError(err.message.includes("unique")?"Name already exists":err.message);setLoading(false);return;}
await supabase.from('ground_members').insert({ground_name:name.trim(),username});
addToast({icon:"🔥",title:"GROUND CREATED!",message:`${emoji} ${name} is live!`,color:AMBER});
onCreated(data);onClose();setLoading(false);
};
return(
<div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.85)"}} onClick={onClose}/>
<div style={{position:"relative",zIndex:301,background:"#111",width:"100%",maxWidth:400,borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",padding:24}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
<div style={{fontSize:18,fontWeight:900,letterSpacing:2}}>CREATE GROUND</div>
<button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:20,cursor:"pointer"}}>×</button>
</div>
<div style={{marginBottom:16}}>
<div style={{fontSize:12,color:"#666",marginBottom:8,letterSpacing:1}}>PICK AN EMOJI</div>

</div>

{error&&<div style={{background:"rgba(255,77,28,0.1)",border:"1px solid rgba(255,77,28,0.3)",borderRadius:6,padding:"10px 14px",fontSize:13,marginBottom:16,color:FIRE}}>{error}</div>}
<div style={{display:"flex",gap:8}}>
<button onClick={onClose} style={{flex:1,background:"transparent",color:"#888",border:"1px solid rgba(255,255,255,0.1)",padding:"12px",borderRadius:6,fontSize:14,cursor:"pointer"}}>Cancel</button>
<button onClick={submit} disabled={loading} style={{flex:2,background:loading?"#333":FIRE,color:"#fff",border:"none",padding:"12px",borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer"}}>{loading?"Creating...":"Create Ground 🔥"}</button>
</div>
</div>
</div>
);
}

<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
<div style={{fontSize:32,fontWeight:900,letterSpacing:3,fontFamily:"'Bebas Neue',sans-serif"}}>GROUNDS</div>

<div style={{fontSize:13,color:"#666",marginBottom:12}}>Communities built on honesty.</div>

function FeedScreen({user,addToast,onUserClick,onDM}){

useEffect(()=>{
fetchPosts();
const ch=supabase.channel('realtime-posts').on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},p=>{
setPosts(prev=>[p.new,...prev]);
if(p.new.username!==username)addToast({icon:"🔥",title:"NEW POST",message:`@${p.new.username} just posted!`,color:FIRE});
if(p.new.body?.includes(`@${username}`))addToast({icon:"📣",title:"MENTIONED",message:`@${p.new.username} mentioned you!`,color:AMBER});

return()=>supabase.removeChannel(ch);
},[]);

setFetching(true);

if(data)setPosts(data);setFetching(false);
};
const pickImage=(e)=>{
const file=e.target.files[0];if(!file)return;
setVideoFile(null);setVideoPreview(null);
setImageFile(file);const r=new FileReader();r.onload=ev=>setImagePreview(ev.target.result);r.readAsDataURL(file);
};
const pickVideo=(e)=>{
const file=e.target.files[0];if(!file)return;
setImageFile(null);setImagePreview(null);
setVideoFile(file);setVideoPreview(URL.createObjectURL(file));

const submitPost=async()=>{
if(!newPost.trim()&&!imageFile&&!videoFile)return;setLoading(true);setUploadProgress(0);
let image_url=null;let video_url=null;
if(imageFile){
const path=`${username}-${Date.now()}.jpg`;
const{error}=await supabase.storage.from('post-images').upload(path,imageFile,{contentType:imageFile.type});
if(!error)image_url=path;
}

const path=`${username}-${Date.now()}.mp4`;
setUploadProgress(10);
const{error}=await supabase.storage.from('post-videos').upload(path,videoFile,{contentType:videoFile.type});
if(!error)video_url=path;
setUploadProgress(100);
}
await supabase.from('posts').insert({body:newPost,username,ground:"🎙 Open Mic",image_url,video_url});
setNewPost("");setImageFile(null);setImagePreview(null);setVideoFile(null);setVideoPreview(null);setUploadProgress(0);setLoading(false);
};

))}

{loading&&videoFile&&<div style={{marginTop:8,background:"#1A1A1A",borderRadius:4,overflow:"hidden",height:4}}><div style={{height:"100%",background:FIRE,width:`${uploadProgress}%`,transition:"width 0.3s"}}/></div>}

function App(){

const[toasts,setToasts]=useState([]);
const[notifs,setNotifs]=useState([]);
const[showNotifs,setShowNotifs]=useState(false);
const[unread,setUnread]=useState(0);
const[viewUser,setViewUser]=useState(null);
const[showDM,setShowDM]=useState(false);
const[dmRecipient,setDmRecipient]=useState(null);
const[dmUnread,setDmUnread]=useState(0);
const toastTimer=useRef({});

const addToast=(t)=>{
const id=Date.now();const toast={...t,id};
setToasts(p=>[...p,toast]);
setNotifs(p=>[{...toast,time:new Date().toISOString(),read:false},...p]);
setUnread(p=>p+1);
toastTimer.current[id]=setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),4000);
};
const removeToast=(id)=>{clearTimeout(toastTimer.current[id]);setToasts(p=>p.filter(x=>x.id!==id));};
const openNotifs=()=>{setShowNotifs(true);setUnread(0);setNotifs(p=>p.map(n=>({...n,read:true})));};
const openDM=(recipient)=>{setDmRecipient(recipient||null);setShowDM(true);setDmUnread(0);};

useEffect(()=>{
supabase.auth.getSession().then(({data:{session}})=>{
if(session?.user){setUser(session.user);setScreen("feed");}setLoading(false);
});
supabase.auth.onAuthStateChange((_,session)=>{
if(session?.user){setUser(session.user);setScreen("feed");addToast({icon:"👋",title:"WELCOME",message:"You're part of the revolution!",color:"#10b981"});}
else{setUser(null);setScreen("splash");}
});
},[]);

useEffect(()=>{
if(!user)return;
const username=user?.user_metadata?.username||user?.email?.split("@")[0]||"user";
const ch=supabase.channel('dm-badge').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{
if(p.new.receiver===username&&!showDM){setDmUnread(n=>n+1);}
}).subscribe();
return()=>supabase.removeChannel(ch);
},[user,showDM]);

const handleSignOut=async()=>{await supabase.auth.signOut();setUser(null);setScreen("splash");};
if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",fontSize:32}}>⚡</div>;

const SCREENS=user?["feed","search","communities","profile"]:["splash","auth"];
const LABELS=user?["FEED","SEARCH","GROUNDS","PROFILE"]:["HOME","JOIN"];

return(
<div style={{fontFamily:"'DM Sans',sans-serif",background:"#0A0A0A",color:"#F0EDE8",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
<ToastContainer toasts={toasts} onRemove={removeToast}/>
{showNotifs&&<NotificationsPanel notifs={notifs} onClear={()=>{setNotifs([]);setUnread(0);}} onClose={()=>setShowNotifs(false)}/>}
{viewUser&&<UserProfileModal username={viewUser} currentUser={user} onClose={()=>setViewUser(null)} addToast={addToast} onDM={openDM}/>}
{showDM&&<DMScreen currentUser={user} initialRecipient={dmRecipient} onClose={()=>{setShowDM(false);setDmRecipient(null);}} addToast={addToast}/>}
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(10,10,10,0.97)",position:"sticky",top:0,zIndex:50}}>
<div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setScreen(user?"feed":"splash")}>
<FuseLogo/>
<div style={{fontSize:26,fontWeight:900,letterSpacing:6,background:`linear-gradient(135deg,#fff 30%,${FIRE} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Bebas Neue',sans-serif"}}>FUSE</div>
</div>
<div style={{display:"flex",alignItems:"center",gap:8}}>
{user&&<button onClick={()=>openDM(null)} style={{position:"relative",background:"none",border:"none",cursor:"pointer",padding:6,color:"#888",fontSize:18}}>
💬{dmUnread>0&&<div style={{position:"absolute",top:2,right:2,width:16,height:16,borderRadius:"50%",background:"#8b5cf6",fontSize:10,fontWeight:700,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{dmUnread}</div>}
</button>}
{user&&<button onClick={openNotifs} style={{position:"relative",background:"none",border:"none",cursor:"pointer",padding:6,color:"#888",fontSize:18}}>🔔{unread>0&&<div style={{position:"absolute",top:2,right:2,width:16,height:16,borderRadius:"50%",background:FIRE,fontSize:10,fontWeight:700,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</div>}</button>}
<div style={{display:"flex",gap:3,background:"#111",borderRadius:8,padding:4,border:"1px solid rgba(255,255,255,0.07)"}}>
{SCREENS.map((s,i)=>(
<button key={s} onClick={()=>setScreen(s)} style={{padding:"6px 12px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",border:"none",letterSpacing:1,background:screen===s?FIRE:"transparent",color:screen===s?"#fff":"#888"}}>{LABELS[i]}</button>
))}
</div>
</div>
</div>
{screen==="splash"&&(
<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,position:"relative",minHeight:"80vh"}}>
<div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,77,28,0.15) 0%, transparent 70%)`,pointerEvents:"none"}}/>
<div style={{position:"relative",zIndex:2,textAlign:"center"}}>
<div style={{fontSize:60,marginBottom:4}}>⚡</div>
<div style={{fontSize:80,fontWeight:900,letterSpacing:12,lineHeight:1,background:`linear-gradient(135deg,#fff 30%,${FIRE} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Bebas Neue',sans-serif"}}>FUSE</div>
<div style={{fontSize:12,letterSpacing:4,color:"#666",marginTop:6}}>FREE · UNCENSORED · SOCIAL · EXPRESSION</div>
<p style={{fontSize:18,fontWeight:300,color:"rgba(240,237,232,0.6)",marginTop:24}}>Where <span style={{color:FIRE,fontWeight:600}}>every voice</span> ignites something real.</p>
<div style={{display:"flex",flexDirection:"column",gap:12,width:280,margin:"40px auto 0"}}>
<button onClick={()=>setScreen("auth")} style={{background:FIRE,color:"#fff",border:"none",padding:"15px 32px",fontSize:15,fontWeight:700,borderRadius:6,cursor:"pointer"}}>Join FUSE — It's Free</button>
<button onClick={()=>setScreen("auth")} style={{background:"transparent",color:"#F0EDE8",border:"1px solid rgba(255,255,255,0.12)",padding:"15px 32px",fontSize:15,fontWeight:500,borderRadius:6,cursor:"pointer"}}>Sign In</button>
</div>
<div style={{display:"flex",gap:20,marginTop:40,flexWrap:"wrap",justifyContent:"center"}}>
{["Free Speech","No Cancel Culture","Clean Platform","Real People"].map(v=>(
<div key={v} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#666"}}>
<span style={{width:6,height:6,borderRadius:"50%",background:FIRE,display:"inline-block"}}/> {v}
</div>
))}
</div>
</div>
</div>
)}
{screen==="auth"&&<AuthScreen onAuth={(u)=>{setUser(u);setScreen("feed");}}/>}
{screen==="feed"&&<FeedScreen user={user} addToast={addToast} onUserClick={setViewUser} onDM={openDM}/>}
{screen==="search"&&<SearchScreen currentUser={user} addToast={addToast} onUserClick={setViewUser}/>}
{screen==="communities"&&<CommunitiesScreen currentUser={user} addToast={addToast} onUserClick={setViewUser} onDM={openDM}/>}
{screen==="profile"&&<ProfileScreen user={user} onSignOut={handleSignOut} addToast={addToast} onUserClick={setViewUser} onDM={openDM}/>}
</div>
);
}

function AuthScreen({onAuth}){
const[mode,setMode]=useState("login");
const[email,setEmail]=useState("");
const[pw,setPw]=useState("");
const[uname,setUname]=useState("");
const[loading,setLoading]=useState(false);
const[msg,setMsg]=useState("");
const submit=async()=>{
setLoading(true);setMsg("");
try{
if(mode==="signup"){
const{error}=await supabase.auth.signUp({email,password:pw,options:{data:{username:uname||email.split("@")[0]}}});
if(error)setMsg(error.message);else setMsg("✅ Check your email!");
}else{
const{data,error}=await supabase.auth.signInWithPassword({email,password:pw});
if(error)setMsg(error.message);else onAuth(data.user);
}
}catch(e){setMsg("Something went wrong.");}
setLoading(false);
};
const inp={width:"100%",background:"#1A1A1A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"12px 14px",color:"#F0EDE8",fontSize:14,outline:"none"};
return(
<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",minHeight:"80vh"}}>
<div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,77,28,0.12) 0%, transparent 70%)`,pointerEvents:"none"}}/>
<div style={{position:"relative",zIndex:2,width:"100%",maxWidth:360}}>
<div style={{textAlign:"center",marginBottom:32}}>
<div style={{fontSize:48}}>⚡</div>
<div style={{fontSize:48,fontWeight:900,letterSpacing:8,background:`linear-gradient(135deg,#fff 30%,${FIRE} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Bebas Neue',sans-serif"}}>FUSE</div>
<div style={{fontSize:12,color:"#666",letterSpacing:3,marginTop:4}}>FREE · UNCENSORED · SOCIAL · EXPRESSION</div>
</div>
<div style={{display:"flex",gap:4,background:"#111",borderRadius:8,padding:4,marginBottom:24,border:"1px solid rgba(255,255,255,0.07)"}}>
{["login","signup"].map(m=>(
<button key={m} onClick={()=>{setMode(m);setMsg("");}} style={{flex:1,padding:"10px",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer",border:"none",background:mode===m?FIRE:"transparent",color:mode===m?"#fff":"#666",letterSpacing:1,textTransform:"uppercase"}}>{m==="login"?"Sign In":"Join FUSE"}</button>
))}
</div>
{mode==="signup"&&<div style={{marginBottom:12}}><div style={{fontSize:12,color:"#666",marginBottom:6,letterSpacing:1}}>USERNAME</div><input value={uname} onChange={e=>setUname(e.target.value)} placeholder="@yourname" style={inp}/></div>}
<div style={{marginBottom:12}}><div style={{fontSize:12,color:"#666",marginBottom:6,letterSpacing:1}}>EMAIL</div><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" type="email" style={inp}/></div>
<div style={{marginBottom:20}}><div style={{fontSize:12,color:"#666",marginBottom:6,letterSpacing:1}}>PASSWORD</div><input value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" type="password" style={inp}/></div>
{msg&&<div style={{background:msg.includes("✅")?"rgba(16,185,129,0.1)":"rgba(255,77,28,0.1)",border:`1px solid ${msg.includes("✅")?"rgba(16,185,129,0.3)":"rgba(255,77,28,0.3)"}`,borderRadius:6,padding:"10px 14px",fontSize:13,marginBottom:16,color:msg.includes("✅")?"#10b981":FIRE}}>{msg}</div>}
<button onClick={submit} disabled={loading} style={{width:"100%",background:loading?"#333":FIRE,color:"#fff",border:"none",padding:"14px",borderRadius:6,fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer",letterSpacing:1}}>{loading?"Loading...":(mode==="login"?"SIGN IN":"CREATE ACCOUNT")}</button>
<div style={{textAlign:"center",marginTop:16,fontSize:12,color:"#555"}}>By joining you agree to speak freely and respectfully 🔥</div>
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
